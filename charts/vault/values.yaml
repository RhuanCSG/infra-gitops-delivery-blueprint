# HashiCorp Vault — valores customizados (HA + Raft + KMS auto-unseal)
# Helm chart: https://helm.releases.hashicorp.com | chart: vault
# Verificar versão mais recente: helm search repo hashicorp/vault

global:
  enabled: true

injector:
  # Vault Agent Injector desabilitado — usando External Secrets Operator
  enabled: false

server:
  serviceAccount:
    create: true
    name: vault
    # EKS Pod Identity: sem anotação necessária no ServiceAccount

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address     = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-1.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-2.vault-internal:8200"
          }
        }

        seal "awskms" {
          region     = "<AWS_REGION>"
          kms_key_id = "<KMS_KEY_ARN>"
        }

        service_registration "kubernetes" {}

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: gp3

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Garante que cada réplica fique em um node diferente (necessário para quorum)
  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: vault
              component: server
          topologyKey: kubernetes.io/hostname

ui:
  enabled: true
  serviceType: ClusterIP
